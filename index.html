        /* --- 1. 基礎與背景設定 --- */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            /* 👇 把全站字體換成 Fira Code */
            font-family: 'Fira Code', monospace; 
        }
        body {

        }
        .bg-video {

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(0.5px);
            -webkit-backdrop-filter: blur(0.5px);
            border: 1px solid rgba(255, 255, 255, 0.021);
            border-radius: 0px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .main-board {
            width: 650px; /* 加寬版面 */
            max-width: 95vw;
            padding: 30px;
            display: flex; flex-direction: column; gap: 20px;
        }

        /* --- 3. 頂部標題與子卡片排版 --- */
        .board-header { text-align: left; margin-bottom: 10px; }
        .main-title { 
            font-family: 'Fira Code', monospace; /* 確保大標題也是這個字體 */

            letter-spacing: 2px; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.5); 
        }
        .sub-title { font-size: 14px; color: #ccc; margin-top: 5px; }

        .activity-row {
            display: flex; flex-wrap: wrap; gap: 15px;
        }

        /* --- 4. 獨立活動子卡片 (Discord/Spotify/Youtube) --- */
        .act-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 0px;
            padding: 12px 20px 12px 12px;
            display: flex; align-items: center;
            transform: translateZ(20px); /* 3D 浮出效果 */
            transform-style: preserve-3d;
            flex: 1; min-width: 250px;
        }

        /* 大頭貼與燈號 */
        .avatar-wrapper { position: relative; margin-right: 15px; }

        .status-dot {
            position: absolute; bottom: 0px; right: 0px;
            width: 18px; height: 18px; border-radius: 50%; border: 3px solid #2b2d31;
        }
        .online { background-color: #23a559; }
        .idle { background-color: #f0b232; }
        .dnd { background-color: #f23f43; }
        .offline { background-color: #80848e; }

        .act-info { text-align: left; }
        .act-name { font-size: 18px; font-weight: bold; color: #f2f3f5; margin-bottom: 4px; }
        .act-details { font-size: 13px; color: #b5bac1; }

        /* --- 5. 浮動果凍 Spotify 播放器 (保留不變) --- */
#draggable-spotify {
            position: fixed;
            bottom: 20px;
            right: 20px; 
            width: 300px;
            z-index: 1000; 
            cursor: grab;
            border-radius: 0px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.5s cubic-bezier(0.25, 1.5, 0.5, 1); 
            
            /* 讓整個容器變成 85% 不透明度 */
            opacity: 0.80; 
        }

        /* 關鍵在這裡！讓裡面的 iframe 也跟著透明 */
        #draggable-spotify iframe {
            opacity: 0.80;
        }
        #draggable-spotify:active { cursor: grabbing; }
        .drag-handle {
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(5px);
            color: white; text-align: center; font-size: 12px; padding: 4px;
            border-radius: 0px 0px 0 0; user-select: none;
        }
        @keyframes jelly {
            0% { transform: scale(1, 1); }
            25% { transform: scale(0.9, 1.1); }
            50% { transform: scale(1.1, 0.9); }
            75% { transform: scale(0.95, 1.05); }
            100% { transform: scale(1, 1); }
        }
        .jelly-anim { animation: jelly 0.5s ease; }

        /* --- 6. 終極裝備：下拉式選單 --- */
        .links-dropdown {
            width: 100%;
            margin-top: 10px;
        }

        /* 下拉按鈕本體 */
        .dropdown-toggle {
            width: 100%;
            background: rgba(0, 0, 0, 0);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0);
            padding: 15px;
            border-radius: 0px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }
        .dropdown-toggle:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* 隱藏的選單內容區塊 (利用 max-height 做滑順動畫) */
        .dropdown-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-in-out, margin-top 0.4s ease;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 0;
        }
        /* 展開時的狀態 */
        .dropdown-content.show {
            max-height: 500px; /* 只要比你按鈕總高度大就好 */
            margin-top: 15px;
        }

        /* 每一個連結按鈕的設計 */
        .social-btn {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 15px;
            border-radius: 0px;
            color: #ddd;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .social-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(10px); /* 滑鼠移過去會往右浮動，超帥 */
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* GIF 小圖示的設定 */
        .btn-gif {
            width: 24px;
            height: 24px;
            margin-right: 15px;
            border-radius: 0px; /* 如果 GIF 是方的，可以加點圓角 */
            object-fit: cover;
        }

        /* 箭頭旋轉動畫 */
        .arrow { transition: transform 0.3s ease; }
        .arrow.rotate { transform: rotate(180deg); }

/* --- 7. 教官特製：頂級 Linux 狀態列 (你弄丟的吧台！) --- */
        .linux-bar {
            position: fixed;
            top: 0; left: 0; width: 100%;

        .linux-left, .linux-right { display: flex; gap: 15px; align-items: center; }
        .linux-item { display: flex; align-items: center; gap: 5px; }
        .linux-icon { color: #888; font-weight: bold; }
        /* 隱藏的下拉面板設定 */
        .bar-dropdown {
            position: absolute;
            top: 28px; /* 貼齊狀態列底部 */
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0 0 8px 8px;
            padding: 10px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            transform: translateY(-10px);
            z-index: 10000;
        }
        
        /* 滑鼠移上去就顯示！ */
        .bar-dropdown-container:hover .bar-dropdown {
            opacity: 1;
            visibility: visible;

        /* 個別面板的微調 */
        .spotify-drop { left: 0; display: flex; gap: 10px; width: 200px; }

        /* 行事曆的格子排版 */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 5px; }
        .cal-day { font-size: 10px; padding: 3px; border-radius: 3px; }
        .cal-today { background: rgba(255,255,255,0.2); color: white; font-weight: bold; }

    </style>

    <script>
        // --- 你的果凍特效神經指令 (完全保留) ---
        const spotify = document.getElementById('draggable-spotify');
        const handle = spotify.querySelector('.drag-handle');
        const iframe = spotify.querySelector('iframe');
        let isDragging = false;
        let offsetX, offsetY, lastX = 0, lastY = 0;

        handle.addEventListener('mousedown', (e) => {
            isDragging = true;
            offsetX = e.clientX - spotify.getBoundingClientRect().left;
            offsetY = e.clientY - spotify.getBoundingClientRect().top;
            lastX = e.clientX; lastY = e.clientY;
            spotify.style.transition = 'none'; 
            spotify.style.transform = 'scale(1.05)';
            iframe.style.pointerEvents = 'none';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            let currentX = e.clientX, currentY = e.clientY;
            let speedX = currentX - lastX, speedY = currentY - lastY;
            lastX = currentX; lastY = currentY;
            let skewXValue = Math.max(-15, Math.min(15, speedX * 0.4));
            let skewYValue = Math.max(-15, Math.min(15, speedY * 0.4));
            spotify.style.left = (currentX - offsetX) + 'px';
            spotify.style.top = (currentY - offsetY) + 'px';
            spotify.style.right = 'auto'; spotify.style.bottom = 'auto';
            spotify.style.transform = `scale(1.05) skewX(${-skewXValue}deg) skewY(${-skewYValue}deg) rotate(${speedX/2}deg)`;
        });

        document.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                spotify.style.transition = 'transform 0.5s cubic-bezier(0.25, 1.5, 0.5, 1)';
                spotify.style.transform = 'scale(1) skewX(0deg) skewY(0deg) rotate(0deg)';
                iframe.style.pointerEvents = 'auto';

        });

        dropdownBtn.addEventListener('click', () => {

        });

        // ==========================================
        // 終極 Lanyard 雷達：自動抓取頭像與聽歌狀態
        // ==========================================
        const USER_ID = "987379082687823972"; 
        
        const statusDot = document.getElementById('discord-status-dot');
        const statusText = document.getElementById('discord-status-text');
        const avatarImg = document.getElementById('real-discord-avatar');
        const spotifyCard = document.getElementById('spotify-card');
        const spotifyAlbumArt = document.getElementById('spotify-album-art');
        const spotifySongText = document.getElementById('spotify-song-text');

        const ws = new WebSocket("wss://api.lanyard.rest/socket");

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.op === 1) {
                ws.send(JSON.stringify({ op: 2, d: { subscribe_to_id: USER_ID } }));
            } 
            else if (data.op === 0) {
                const p = data.d;

                avatarImg.src = `https://cdn.discordapp.com/avatars/${USER_ID}/${p.discord_user.avatar}.${ext}?size=128`;

                statusDot.className = `status-dot ${p.discord_status}`;

                let customStatus = p.activities.find(a => a.id === "custom");
                let gameStatus = p.activities.find(a => a.id !== "custom" && a.name !== "Spotify");

                if (gameStatus) {
                    statusText.innerText = `🎮 ${gameStatus.name}`;
                } else if (customStatus && customStatus.state) {
                    let emoji = customStatus.emoji ? (customStatus.emoji.id ? "👾" : customStatus.emoji.name) : "💬";
                    statusText.innerText = `${emoji} ${customStatus.state}`;
                } else {
                    statusText.innerText = p.discord_status === "offline" ? "離線" : "線上";
                }

                const topSpotifyContainer = document.getElementById('top-spotify-container');
                if (p.listening_to_spotify && p.spotify) {
                    spotifyCard.style.display = "flex"; 
                    spotifyAlbumArt.src = p.spotify.album_art_url;
                    spotifySongText.innerText = `${p.spotify.song} by ${p.spotify.artist}`;
                    
                    topSpotifyContainer.style.display = "flex";
                    document.getElementById('top-spotify-title').innerText = p.spotify.song;
                    document.getElementById('top-spotify-img').src = p.spotify.album_art_url;
                    document.getElementById('top-spotify-song').innerText = p.spotify.song;
                    document.getElementById('top-spotify-artist').innerText = p.spotify.artist;
                } else {
                    spotifyCard.style.display = "none"; 
                    topSpotifyContainer.style.display = "none";
                }
            }
        }; // <--- 教官幫你把遺失的大門關上了！

        // ==========================================
        // 教官的終極火力：時間、日曆、天氣、電量系統
        // ==========================================
        function initTimeAndCalendar() {
            const now = new Date();
            let h = now.getHours(), m = now.getMinutes(), ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12; m = m < 10 ? '0' + m : m;
            document.getElementById('linux-clock').innerText = `${h}:${m} ${ampm}`;
            
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
            let calHTML = `<div>${now.getFullYear()}年 ${now.getMonth()+1}月</div><div class="cal-grid">`;
            const weekDays = ['日','一','二','三','四','五','六'];
            weekDays.forEach(d => calHTML += `<div style="color:#888;">${d}</div>`);
            for(let i=0; i<firstDay; i++) calHTML += `<div></div>`; 
            for(let i=1; i<=daysInMonth; i++) {
                let isToday = (i === now.getDate()) ? 'cal-today' : '';
                calHTML += `<div class="cal-day ${isToday}">${i}</div>`;
            }
            calHTML += `</div>`;
            document.getElementById('calendar-container').innerHTML = calHTML;
        }
        setInterval(initTimeAndCalendar, 60000);
        initTimeAndCalendar();

        if (navigator.getBattery) {
            navigator.getBattery().then(function(battery) {
                function updateBatteryInfo() {
                    let level = Math.round(battery.level * 100);
                    let icon = battery.charging ? '⚡' : '🔋';
                    document.getElementById('battery-status').innerHTML = `<span class="linux-icon">${icon}</span> ${level}%`;
                }
                updateBatteryInfo();
                battery.addEventListener('levelchange', updateBatteryInfo);
                battery.addEventListener('chargingchange', updateBatteryInfo);
            });
        }

        fetch('https://api.open-meteo.com/v1/forecast?latitude=25.04&longitude=121.53&current_weather=true')
            .then(res => res.json())
            .then(data => {
                const w = data.current_weather;
                document.getElementById('weather-btn').innerHTML = `<span class="linux-icon">☁</span> ${w.temperature}°C`;
                document.getElementById('weather-details').innerHTML = `

                    <div>溫度：${w.temperature}°C</div>
                    <div>風速：${w.windspeed} km/h</div>
                `;
            }).catch(e => console.log("天氣抓取失敗", e));
    </script>
</body>

</html>
